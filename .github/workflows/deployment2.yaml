name: Deployment Exercise 2 - multi part workflow
on: 
    workflow_run:
      workflows: ["Deployment Exercise 1"]   # exact name from deployment1.yaml
      types:
        - completed
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v3
            - name: Install Dependencies
              run: npm ci
            - name: lint
              run: npm run lint 
            - name: test
              run: npm run test  
            - name: build
              run: npm run build  
            - name: Deploy
              run: echo "Deploying... "  