name: Deployment Exercise 1
on: push
jobs:
    lint:
         runs-on: ubuntu-latest
         steps:
            - name: Get code
              uses: actions/checkout@v3
            - name: Install Dependencies
              run: npm ci
            - name: lint
              run: npm run lint 

    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v3
            - name: Install Dependencies
              run: npm ci
            - name: test
              run: npm run test  
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v3
            - name: Install Dependencies
              run: npm ci
            - name: build
              run: npm run build  
            - name: Deploy
              run: echo "Deploying... "  